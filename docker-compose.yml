services:
  postgres:
    image: postgres:16-alpine
    container_name: vitrina_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitrina_user
      POSTGRES_PASSWORD: vitrina_password
      POSTGRES_DB: vitrina_db
    ports:
      - "5432:5432"
    volumes:
      - vitrina_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitrina_user -d vitrina_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vitrina_postgres_data: